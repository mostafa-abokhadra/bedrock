CreateFolderBody:
  type: object
  properties:
    name:
      type: string
      example: my first folder
    parentId:
      type: string
      example: parent id (a vault or a subfolder)

SuccessfulFolderCreation:
  type: object
  properties:
    message:
      type: string
      example: "folder has been created successfully"

FolderParentNotFound:
  type: object
  properties:
    messsage:
      type: string
      example: "parent doesn't exist"

deleteFolderBody:
  type: object
  properties:
    folderId:
      type: string
      example: 6917178154e6263364b7b104