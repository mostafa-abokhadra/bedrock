CreateFolderBody:
  type: object
  properties:
    name:
      type: string
      example: my first folder
    parentId:
      type: string
      example: parent id (a vault or a subfolder)

SuccessfulFolderCreation:
  type: object
  properties:
    message:
      type: string
      example: "folder has been created successfully"

FolderParentNotFound:
  type: object
  properties:
    messsage:
      type: string
      example: "parent doesn't exist"

DeleteFolderBody:
  type: object
  properties:
    folderId:
      type: string
      example: 6917178154e6263364b7b104

FolderNotFound:
  type: object
  properties:
    messsage:
      type: string
      example: "folder doesn't exist"

SuccessfulFolderDeletion:
  type: object
  properties:
    message:
      type: string
      example: "folder has been deleted successfully"
