post:
  tags:
    - Folder APIs
  summary: create a new folder
  security:
    - BasicAuth: []
  parameters:
    - $ref: '../../components/parameters.yaml#/CSRFtokenHeader'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../components/schemas/folder/folderSchemas.yaml#/CreateFolderBody'
  responses:
    201:
      description: new folder created successfully
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/folder/folderSchemas.yaml#/SuccessfulFolderCreation'
    403:
      description: user try to make authenticated operation while not authenticated
        or user sent an invalid csrf token
      content:
        application/json:
          schema:
            anyOf:
              - $ref: '../../components/schemas/globalSchemas.yaml#/isNotAuthenticated'
              - $ref: '../../components/schemas/globalSchemas.yaml#/invalidCSRFtoken'
    400:
      description: body field problem
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/globalSchemas.yaml#/BadRequestResponse'
    500:
      description: server error
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/globalSchemas.yaml#/ServerError'